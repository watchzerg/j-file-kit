# j-file-kit 任务配置文件示例
# 复制此文件为 task_config.yaml 并修改相应路径

# 全局配置
global:
  scan_roots:                                    # 扫描根目录列表（支持多个目录）
    - /path/to/your/files1                       # 第一个扫描目录（必须修改）
    - /path/to/your/files2                       # 第二个扫描目录（可选）
    - /path/to/your/files3                       # 第三个扫描目录（可选）
  log_dir: ./logs                                # 日志目录
  report_dir: ./reports                          # 报告目录

# 任务列表
tasks:
  # 任务1: 视频文件整理任务
  - name: video_file_organizer
    type: file_organize
    enabled: true
    config:
      # 目标目录配置
      organized_dir: /path/to/organized              # 整理后的视频图片存储目录（B类，按A/ABCD/ABCD-123.mp4格式）
      unorganized_dir: /path/to/unorganized          # 无番号视频图片存储目录（C类）
      archive_dir: /path/to/archives                 # 压缩文件存储目录
      misc_dir: /path/to/misc                        # 其他文件存储目录（D类，用于后续人工处理）
      
      # 文件类型配置
      video_extensions:
        - .mp4
        - .avi
        - .mkv
        - .mov
        - .wmv
        - .flv
        - .webm
      
      image_extensions:
        - .jpg
        - .jpeg
        - .png
        - .webp
        - .bmp
        - .gif
        - .tiff
      
      archive_extensions:
        - .zip
        - .rar
        - .7z
        - .tar
        - .gz
        - .bz2
        - .xz
      
      # 删除规则配置（用于Other文件）
      delete_rules:
        keywords:                                    # 文件名包含这些关键字则删除
          - ".tmp"
          - ".temp"
          - ".bak"
          - ".old"
        extensions:                                  # 这些扩展名的文件将被删除
          - .tmp
          - .temp
          - .bak
          - .old
        max_size: 1048576                            # 小于等于此大小的文件将被删除（字节，1MB）
      
      # 番号规则已内置，无需配置

  # 任务2: 数据库更新任务（未来扩展示例）
  - name: db_updater
    type: db_update
    enabled: false
    config:
      db_connection: postgresql://localhost/mydb
      update_fields:
        - file_path
        - file_size
        - last_modified
        - file_type
        - serial_id
      batch_size: 1000
      timeout: 30

  # 任务3: 文件清理任务（示例）
  - name: file_cleaner
    type: file_cleanup
    enabled: false
    config:
      delete_duplicates: false
      min_age_days: 30
      file_patterns:
        - "*.tmp"
        - "*.temp"
        - "*.bak"
        - "*.old"

# 高级配置（可选）
advanced:
  # 重试设置
  max_retries: 3                                     # 最大重试次数
  retry_delay: 1                                     # 重试延迟（秒）
  
  # 日志设置
  log_level: "INFO"                                  # 日志级别：DEBUG, INFO, WARNING, ERROR
  log_format: "json"                                 # 日志格式：json, text
  
  # 性能设置
  batch_size: 100                                    # 批处理大小
  progress_interval: 10                               # 进度报告间隔（秒）
