services:
  j-file-kit:
    build: .
    container_name: j-file-kit
    ports:
      - "8000:8000"
    volumes:
      # 应用数据持久化（config / sqlite / logs）
      # APP_DATA_DIR 未设置时默认使用 ./app-data
      - ${APP_DATA_DIR:-./app-data}:/data
      # 媒体目录：宿主机路径由 .env 中的 MEDIA_ROOT 变量控制
      # 请复制 .env.example 为 .env 并填写实际路径
      - ${MEDIA_ROOT}:/media
    environment:
      # 运行环境：production 时启动会校验 /media 是否已挂载
      J_FILE_KIT_ENV: production
      # 应用数据目录（容器内路径，与上方 volume 挂载目标保持一致）
      J_FILE_KIT_BASE_DIR: /data
      # entrypoint 根据 PUID/PGID 修复 /data 权限后降权运行，默认与 Unraid nobody:users（99:100）一致
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
    restart: unless-stopped
