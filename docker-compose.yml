services:
  j-file-kit:
    build: .
    container_name: j-file-kit
    ports:
      - "8000:8000"
    volumes:
      # 应用数据持久化（config / sqlite / logs）
      - ./app-data:/data
      # 媒体目录（必须配置，否则容器启动失败）
      # 请取消注释以下行并将宿主机路径替换为实际路径
      # - /path/to/your/inbox:/media/inbox
      # - /path/to/your/sorted:/media/sorted
      # - /path/to/your/unsorted:/media/unsorted
      # - /path/to/your/archive:/media/archive
      # - /path/to/your/misc:/media/misc
    environment:
      - J_FILE_KIT_ENV=production
    restart: unless-stopped
