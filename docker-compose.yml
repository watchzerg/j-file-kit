services:
  j-file-kit:
    build: .
    container_name: j-file-kit
    ports:
      - "8000:8000"
    volumes:
      # 应用数据持久化（config / sqlite / logs）
      # APP_DATA_DIR 未设置时默认使用 ./app-data
      - ${APP_DATA_DIR:-./app-data}:/data
      # 媒体目录：宿主机路径由 .env 中的 MEDIA_ROOT 变量控制
      # 请复制 .env.example 为 .env 并填写实际路径
      - ${MEDIA_ROOT}:/media
    restart: unless-stopped
