# Pre-commit 配置
# 安装HOOK： uv run pre-commit install --hook-type pre-commit --hook-type pre-push
# 手工运行 commit检查： uv run pre-commit run --hook-stage pre-commit --all-files
# 手工运行 push检查： uv run pre-commit run --hook-stage pre-push --all-files

repos:
  - repo: local
    hooks:
      # ----------- pre-commit 阶段的钩子 -----------
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python]
      
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        args: ["--fix"]
        language: system
        types_or: [python]
        
      - id: mypy
        name: mypy
        entry: uv run mypy
        args: ["."]
        language: system
        pass_filenames: false # 不传递文件名，因为 mypy 会自动选择相关模块

      - id: pytest
        name: pytest (unit + testmon)
        entry: uv run pytest
        args: ["--testmon", "-m", "unit"]
        language: system
        pass_filenames: false # 不传递文件名，因为 testmon 会自动选择相关测试

      # ----------- pre-push 阶段的钩子（全量检查）-----------
      - id: ruff-format-push
        name: ruff format (all files)
        entry: uv run ruff format
        args: ["--check", "."]
        language: system
        pass_filenames: false # 检查所有文件
        always_run: true
        stages: [pre-push]

      - id: ruff-check-push
        name: ruff check (all files)
        entry: uv run ruff check
        args: ["."]
        language: system
        pass_filenames: false # 检查所有文件，不自动修复
        always_run: true
        stages: [pre-push]

      - id: mypy-push
        name: mypy (all files)
        entry: uv run mypy
        args: ["--no-incremental", "."]
        language: system
        pass_filenames: false # 检查所有文件
        always_run: true
        stages: [pre-push]

      - id: pytest-push
        name: pytest (all tests)
        entry: uv run pytest
        args: ["-m", "unit or integration and not slow"]
        language: system
        pass_filenames: false # 运行所有测试，不使用增量模式
        always_run: true
        stages: [pre-push]

