# Pre-commit 配置
# 安装HOOK： uv run pre-commit install --hook-type pre-commit --hook-type pre-push
# 手工运行 commit检查： uv run pre-commit run --hook-stage pre-commit --all-files
# 手工运行 push检查： uv run pre-commit run --hook-stage pre-push --all-files

repos:
  - repo: local
    hooks:
      # ----------- pre-commit 阶段的钩子 -----------
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python]
      
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        args: ["--fix"]
        language: system
        types_or: [python]
        
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false # 不传递文件名：ty 从 pyproject.toml 发现项目

      - id: pytest
        name: pytest (unit + testmon)
        entry: uv run pytest
        args: ["--testmon", "-m", "unit"]
        language: system
        pass_filenames: false # 不传递文件名，因为 testmon 会自动选择相关测试

      - id: fe-biome
        name: biome check --write (frontend changed files)
        entry: bash -c 'cd frontend && bunx biome check --write .'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|css)$
        pass_filenames: false

      # ----------- pre-push 阶段的钩子（全量检查）-----------
      - id: uv-pip-check-push
        name: uv pip check (dependency compatibility)
        entry: uv pip check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pip-audit-push
        name: pip audit (security check)
        entry: uv run pip-audit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ruff-format-push
        name: ruff format (all files)
        entry: uv run ruff format
        args: ["--check", "."]
        language: system
        pass_filenames: false # 检查所有文件
        always_run: true
        stages: [pre-push]

      - id: ruff-check-push
        name: ruff check (all files)
        entry: uv run ruff check
        args: ["."]
        language: system
        pass_filenames: false # 检查所有文件，不自动修复
        always_run: true
        stages: [pre-push]

      - id: ty-push
        name: ty (all files)
        entry: uv run ty check
        language: system
        pass_filenames: false # 全量类型检查
        always_run: true
        stages: [pre-push]

      - id: pytest-push
        name: pytest (all tests)
        entry: uv run pytest
        args: ["-n", "auto", "-m", "unit or integration and not slow",
          "--maxfail=1", "--durations=10"]
        language: system
        pass_filenames: false # 运行所有测试，不使用增量模式
        always_run: true
        stages: [pre-push]

      - id: fe-biome-push
        name: biome check (frontend, strict)
        entry: bash -c 'cd frontend && bunx biome check .'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: fe-tsc-push
        name: tsc --noEmit (frontend type check)
        entry: bash -c 'cd frontend && bunx tsc --noEmit'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: fe-test-push
        name: vitest run (frontend unit tests)
        entry: bash -c 'cd frontend && bun run test'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: check YAML syntax
        stages: [pre-push]
      - id: check-json
        name: check JSON syntax
        stages: [pre-push]